name: Publish Coverage

on:
  workflow_run:
    workflows: ["Coverage"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the triggering Coverage workflow"
        required: true
        type: string
      artifact_name:
        description: "Artifact name to download (default: coverage)"
        required: false
        default: coverage
        type: string

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.repository == 'gluesql/gluesql'
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Resolve coverage run metadata
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isDispatch = context.eventName === 'workflow_dispatch';

            let run;
            let artifactName = 'coverage';

            if (isDispatch) {
              const inputs = context.payload.inputs || {};
              const runId = inputs.run_id;
              artifactName = inputs.artifact_name || artifactName;

              const response = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              run = response.data;
            } else {
              run = context.payload.workflow_run;
            }

            const headSha = run.head_sha;
            const headBranch = run.head_branch;
            const headRepository = run.head_repository?.full_name;

            if (!headRepository || !headBranch) {
              throw new Error(`Missing head repository or branch for coverage run ${run.id}`);
            }

            const [headOwner] = headRepository.split('/');
            const response = await github.rest.pulls.list({
              owner,
              repo,
              base: 'main',
              head: `${headOwner}:${headBranch}`,
              state: 'open',
            });

            if (response.data.length !== 1) {
              throw new Error(`Expected one pull request for coverage run ${run.id}, found ${response.data.length}`);
            }

            const pullRequest = response.data[0];

            if (pullRequest.head.sha !== headSha) {
              core.notice(
                `Skipping coverage publish: coverage run ${run.id} is for ${headSha}, but PR #${pullRequest.number} currently points to ${pullRequest.head.sha}`,
              );
              core.exportVariable('PUBLISH_COVERAGE', 'false');
              return;
            }

            const prNumber = pullRequest.number;

            core.exportVariable('PUBLISH_COVERAGE', 'true');
            core.exportVariable('RUN_ID', String(run.id));
            core.exportVariable('COMMIT_SHA', headSha);
            core.exportVariable('PR_NUMBER', String(prNumber));
            core.exportVariable('ARTIFACT_NAME', artifactName);
      - name: Download coverage artifact
        if: env.PUBLISH_COVERAGE == 'true'
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          run-id: ${{ env.RUN_ID }}
          path: coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # No normalization needed: file will be at ./coverage/lcov.info.xz
      - name: Set timestamp
        if: env.PUBLISH_COVERAGE == 'true'
        run: echo "TIMESTAMP=$(date -u +'%Y-%m-%dT%H%M%SZ')" >> $GITHUB_ENV
      - name: Configure git user
        if: env.PUBLISH_COVERAGE == 'true'
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Create GitHub App token
        if: env.PUBLISH_COVERAGE == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.COVERAGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.COVERAGE_APP_PRIVATE_KEY }}
          owner: gluesql
          repositories: gluesql, gluesql.github.io
      - name: Publish coverage to gluesql.github.io
        if: env.PUBLISH_COVERAGE == 'true'
        run: |
          git clone https://github.com/gluesql/gluesql.github.io.git
          cd gluesql.github.io
          git checkout gh-pages
          git pull --rebase origin gh-pages
          mkdir -p coverage/pr/${PR_NUMBER}
          cp ../coverage/lcov.info.xz coverage/pr/${PR_NUMBER}/${TIMESTAMP}.${COMMIT_SHA}.lcov.info.xz
          git add coverage/pr/${PR_NUMBER}/${TIMESTAMP}.${COMMIT_SHA}.lcov.info.xz
          git commit -m "Coverage: PR#${PR_NUMBER}@${COMMIT_SHA}"
          git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/gluesql/gluesql.github.io.git
      - name: Comment coverage link on PR
        if: env.PUBLISH_COVERAGE == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = process.env.PR_NUMBER;
            const url = `https://gluesql.org/coverage/?path=pr/${prNumber}/${process.env.TIMESTAMP}.${process.env.COMMIT_SHA}.lcov.info.xz`;
            const body = [
              '### GlueSQL Coverage Report',
              '',
              `- **Commit:** \`${process.env.COMMIT_SHA}\``,
              `- **Timestamp:** \`${process.env.TIMESTAMP}\``,
              `- **Report:** [View report](${url})`
            ].join('\n');
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );
            const comment = comments.find(c => c.body.startsWith('### GlueSQL Coverage Report'));
            if (comment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
