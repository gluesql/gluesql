name: Publish Docs

on:
  workflow_dispatch:
    inputs:
      # Latest commit to include with the release. If omitted, use the latest commit on the main branch.
      sha:
        description: Commit SHA
        type: string

env:
  ZENSICAL_VERSION: "0.0.43"

permissions:
  contents: read

jobs:
  publish_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || 'main' }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Zensical
        run: python -m pip install "zensical==${ZENSICAL_VERSION}"

      - name: Clone gluesql.org
        run: git clone https://github.com/gluesql/gluesql.github.io.git &&
          cd gluesql.github.io &&
          git checkout gh-pages

      - name: Fetch version
        run: |
          VERSION=$(grep "^version = " Cargo.toml | sed 's/version = "\(.*\)"/\1/'>&1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build docs
        run: |
          cd docs
          python -c "from pathlib import Path; Path('zensical.release.toml').write_text(Path('zensical.toml').read_text().replace('https://gluesql.org/docs/dev/', 'https://gluesql.org/docs/${{ env.VERSION }}/'))"
          zensical build --config-file zensical.release.toml

      - name: Update docs version on gluesql.org
        run: |
          rm -rf gluesql.github.io/docs/${{ env.VERSION }}
          mkdir -p gluesql.github.io/docs
          mv docs/build gluesql.github.io/docs/${{ env.VERSION }}

      - name: Update docs index.html redirect
        run: |
          cat > gluesql.github.io/docs/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirect to GlueSQL Docs</title>
            </head>
          <style>
          </style>
            <body>
              <script>
                location.href = 'https://gluesql.org/docs/${VERSION}/';
              </script>
            </body>
          </html>
          EOF

      - name: Prepare
        run: |
          git config --global user.email "taehoon.moon@outlook.com"
          git config --global user.name "Taehoon Moon (Bot)"

      - name: Commit and deploy
        run: |
          cd gluesql.github.io
          git add docs/${{ env.VERSION }} docs/index.html
          git diff-index --quiet HEAD || (
            git commit -m "Publish Docs - ${{ env.VERSION }}" &&
            git push https://panarch:${{ secrets.GLUESQL_ORG }}@github.com/gluesql/gluesql.github.io.git
          )
