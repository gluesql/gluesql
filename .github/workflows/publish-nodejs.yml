name: Publish Node.js

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA (defaults to latest main)
        type: string
      dry_run:
        description: Dry run
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

# ---------------------------------------------------------------------------
# Build matrix — mirrors pkg/python (linux + macos, x64 + aarch64)
# plus linux-musl for Alpine / Docker environments.
# ---------------------------------------------------------------------------
jobs:
  build:
    name: build · ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              rustup target add aarch64-unknown-linux-gnu
              npm run build -- --target aarch64-unknown-linux-gnu \
                --use-napi-cross

          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build -- --target x86_64-unknown-linux-musl \
              --use-napi-cross

          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: |
              rustup target add aarch64-unknown-linux-musl
              npm run build -- --target aarch64-unknown-linux-musl \
                --use-napi-cross

          - host: macos-13
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin

          - host: macos-14
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust target
        run: rustup target add ${{ matrix.settings.target }}

      - name: Install @napi-rs/cli
        run: npm install --global @napi-rs/cli

      - name: Install dependencies
        run: npm install
        working-directory: pkg/nodejs

      - name: Build
        run: ${{ matrix.settings.build }}
        working-directory: pkg/nodejs
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: pkg/nodejs/gluesql.*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Smoke-test on the native runner (x86_64 Linux only — matches build host)
  # ---------------------------------------------------------------------------
  test:
    name: test · x86_64-linux
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download x86_64-linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: pkg/nodejs

      - name: Generate JS/DTS from binary
        run: |
          npm install
          npx napi create-npm-dirs
          npx napi artifacts --dist npm
        working-directory: pkg/nodejs

      - name: Run tests
        run: npm test
        working-directory: pkg/nodejs

  # ---------------------------------------------------------------------------
  # Publish
  # ---------------------------------------------------------------------------
  publish:
    name: publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for npm provenance (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install @napi-rs/cli
        run: npm install --global @napi-rs/cli

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: pkg/nodejs/artifacts

      - name: Move binaries and create per-platform packages
        run: |
          npm install
          napi create-npm-dirs
          napi artifacts --dir artifacts --dist npm
        working-directory: pkg/nodejs

      - name: Publish per-platform packages
        if: ${{ inputs.dry_run == false }}
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --provenance --access public
          done
        working-directory: pkg/nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
        working-directory: pkg/nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
